site_name: emhash documentation
site_description: High-performance C++ hash table library
site_author: Huang Yuanbing

docs_dir: '.'

theme:
  name: material
  palette:
    primary: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest

nav:
  - Home: index.md
  - API Reference: api.md
  - Design: design.md
  - Performance: performance.md
  - Performance Tips: performance_tips.md
  - Usage Notes: usage_notes.md
  - FAQ: faq.md
  - Migration Guide: migration_guide.md
  - Performance Tracking: performance_tracking.md
  - Test Analysis: test_analysis.md
  - Examples: examples/README.md
  - Architecture Decisions: adr/README.md

markdown_extensions:
  - tables
  - fenced_code
  - codehilite
