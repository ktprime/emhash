name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'images/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++
          - os: ubuntu-latest
            compiler: clang++
          - os: macos-latest
            compiler: g++
          - os: macos-latest
            compiler: clang++

    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt
            ~/.cache/apt
          key: apt-${{ matrix.compiler }}-${{ runner.os }}-v1
          restore-keys: |
            apt-${{ matrix.compiler }}-${{ runner.os }}-

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          package="${{ matrix.compiler }}"
          if [[ "$package" == "clang++" ]]; then
            package="clang"
          fi
          sudo apt-get update && sudo apt-get install -y "$package"

      - name: Install GCC on macOS (real gcc, not clang)
        if: runner.os == 'macOS' && matrix.compiler == 'g++'
        run: |
          brew install gcc
          # Dynamically find the installed g++ version (avoid hardcoding)
          BREW_PREFIX=$(brew --prefix)
          GPP_BIN=$(ls "$BREW_PREFIX/bin/g++-"* 2>/dev/null | head -1)
          if [[ -n "$GPP_BIN" ]]; then
            ln -sf "$GPP_BIN" "$BREW_PREFIX/bin/g++"
          fi
          echo "$BREW_PREFIX/bin" >> $GITHUB_PATH
          g++ --version | head -1

      # macOS ARM64 + GCC has a system header bug (arm_acle.h uint64_t vs unsigned long)
      - name: Set compiler flags for macOS GCC
        if: runner.os == 'macOS' && matrix.compiler == 'g++'
        run: echo "CXXFLAGS_EXTRA=-fpermissive" >> $GITHUB_ENV

      - name: Set compiler flags (default)
        if: runner.os != 'macOS' || matrix.compiler != 'g++'
        run: echo "CXXFLAGS_EXTRA=" >> $GITHUB_ENV

      - name: Build verify tests
        run: |
          cd tests
          ${{ matrix.compiler }} -std=c++17 -O2 $CXXFLAGS_EXTRA -I../include verify/test_all_maps.cpp -o test_verify
          ${{ matrix.compiler }} -std=c++17 -O2 $CXXFLAGS_EXTRA -I../include verify/test_extreme.cpp -o test_extreme
          ${{ matrix.compiler }} -std=c++17 -O2 $CXXFLAGS_EXTRA -I../include verify/test_hashset_allocator.cpp -o test_hashset_allocator
        shell: bash

      - name: Build debug tests
        run: |
          cd tests
          ${{ matrix.compiler }} -std=c++17 -g -O0 $CXXFLAGS_EXTRA -I../include debug/debug_all_maps.cpp -o test_debug
        shell: bash

      - name: Build attack tests
        run: |
          cd tests
          ${{ matrix.compiler }} -std=c++17 -O2 -DEMH_SAFE_PSL $CXXFLAGS_EXTRA -I../include attack/hash_attack_all.cpp -o test_attack
        shell: bash

      - name: Build stress tests
        run: |
          cd tests
          ${{ matrix.compiler }} -std=c++17 -O2 $CXXFLAGS_EXTRA -I../include stress/stress_all_maps.cpp -o test_stress
        shell: bash

      - name: Run verify tests
        run: |
          cd tests
          ./test_verify
          ./test_extreme
          ./test_hashset_allocator
          ./test_attack
          ./test_stress
        shell: bash

      - name: Run debug tests
        run: cd tests && ./test_debug
        shell: bash

      - name: Strict warnings (C++17)
        if: runner.os != 'macOS' || matrix.compiler != 'g++'
        run: |
          cd tests
          ${{ matrix.compiler }} -std=c++17 -O2 -Wall -Wextra -Wpedantic -Wshadow -Wnon-virtual-dtor -Wno-unused-parameter -Werror -I../include verify/test_all_maps.cpp -o test_warnings17
        shell: bash

      - name: Strict warnings (C++20)
        if: runner.os != 'macOS' || matrix.compiler != 'g++'
        run: |
          cd tests
          ${{ matrix.compiler }} -std=c++20 -O2 -Wall -Wextra -Wpedantic -Wshadow -Wnon-virtual-dtor -Wno-unused-parameter -Werror -I../include verify/test_all_maps.cpp -o test_warnings20
        shell: bash

      - name: Strict warnings (C++23)
        if: runner.os != 'macOS' || matrix.compiler != 'g++'
        run: |
          cd tests
          ${{ matrix.compiler }} -std=c++23 -O2 -Wall -Wextra -Wpedantic -Wshadow -Wnon-virtual-dtor -Wno-unused-parameter -Werror -I../include verify/test_all_maps.cpp -o test_warnings23
        shell: bash

  compat:
    name: Compat / ${{ matrix.compiler }} / C++${{ matrix.std }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
        std: [17, 20, 23]

    steps:
      - uses: actions/checkout@v6

      - name: Install compiler
        run: |
          sudo apt-get update
          package="${{ matrix.compiler }}"
          if [[ "$package" == "clang++" ]]; then
            package="clang"
          fi
          sudo apt-get install -y "$package"

      - name: Compile verify tests
        run: |
          cd tests
          ${{ matrix.compiler }} -std=c++${{ matrix.std }} -O2 -I../include verify/test_all_maps.cpp -o test_verify_compat
        shell: bash

      - name: Run verify tests
        run: cd tests && ./test_verify_compat
        shell: bash

  asan:
    name: ASan / UBSan / ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [g++, clang++]
        exclude:
          # Real GCC on macOS (Homebrew gcc) does not ship libasan, so
          # `-fsanitize=address` fails with "ld: library 'asan' not found".
          # macOS ASan coverage is already provided by macos + clang++.
          - os: macos-latest
            compiler: g++

    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt
            ~/.cache/apt
          key: apt-asan-${{ matrix.compiler }}-${{ runner.os }}-v1
          restore-keys: |
            apt-asan-${{ matrix.compiler }}-${{ runner.os }}-

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          package="${{ matrix.compiler }}"
          if [[ "$package" == "clang++" ]]; then
            package="clang"
          fi
          sudo apt-get update && sudo apt-get install -y "$package"

      - name: Set compiler flags (default)
        run: echo "CXXFLAGS_EXTRA=" >> $GITHUB_ENV

      - name: Build with ASan
        run: |
          cd tests
          # Verification tests
          ${{ matrix.compiler }} -std=c++17 -O1 -fsanitize=address,undefined -fno-omit-frame-pointer $CXXFLAGS_EXTRA -I../include verify/test_all_maps.cpp -o test_verify_asan
          ${{ matrix.compiler }} -std=c++17 -O1 -fsanitize=address,undefined -fno-omit-frame-pointer $CXXFLAGS_EXTRA -I../include verify/test_extreme.cpp -o test_extreme_asan
          # Stress tests
          ${{ matrix.compiler }} -std=c++17 -O1 -fsanitize=address,undefined -fno-omit-frame-pointer $CXXFLAGS_EXTRA -I../include stress/stress_fix.cpp -o test_stress_asan
          # Attack tests (with EMH_SAFE_PSL)
          ${{ matrix.compiler }} -std=c++17 -O1 -fsanitize=address,undefined -fno-omit-frame-pointer -DEMH_SAFE_PSL $CXXFLAGS_EXTRA -I../include attack/hash_attack_all.cpp -o test_attack_asan
        shell: bash

      - name: Run with ASan
        run: |
          cd tests
          ./test_verify_asan
          ./test_extreme_asan
          ./test_stress_asan
          ./test_attack_asan
        shell: bash

  cmake:
    name: CMake / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -B build -S tests
        shell: bash

      - name: Build
        run: cmake --build build --config Release --target test_verify test_debug test_attack test_stress quick_test8 test_emilib_comprehensive
        shell: bash

      - name: Run quick tests
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cd build/Release
            ./test_verify.exe
            ./test_debug.exe
            ./test_attack.exe
            ./test_stress.exe
            ./quick_test8.exe
            ./test_emilib_comprehensive.exe
          else
            cd build
            ./test_verify
            ./test_debug
            ./test_attack
            ./test_stress
            ./quick_test8
            ./test_emilib_comprehensive
          fi
        shell: bash

  cmake-install:
    name: CMake install / find_package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Configure & Install
        run: |
          cmake -B build -DCMAKE_INSTALL_PREFIX=/tmp/emhash-install
          cmake --build build
          cmake --install build
        shell: bash

      - name: Verify installed files
        run: |
          echo "=== Installed headers ==="
          find /tmp/emhash-install -name '*.hpp' -o -name '*.h' | sort
          echo "=== CMake config files ==="
          find /tmp/emhash-install -name '*.cmake' | sort
          # Verify key files exist
          test -f /tmp/emhash-install/include/emhash/hash_table7.hpp
          test -f /tmp/emhash-install/include/emilib/emihmap1.hpp
          test -f /tmp/emhash-install/lib/cmake/emhash/emhashConfig.cmake
          test -f /tmp/emhash-install/lib/cmake/emhash/emhashConfigVersion.cmake
          echo "All install checks passed"
        shell: bash

      - name: Test find_package
        run: |
          mkdir -p /tmp/test_find_package && cd /tmp/test_find_package
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(test_find_package LANGUAGES CXX)
          find_package(emhash REQUIRED CONFIG PATHS /tmp/emhash-install/lib/cmake/emhash NO_DEFAULT_PATH)
          add_executable(test_app test.cpp)
          target_link_libraries(test_app PRIVATE emhash::emhash)
          EOF
          cat > test.cpp <<'EOF'
          #include <emhash/hash_table7.hpp>
          int main() {
              emhash7::HashMap<int,int> m;
              m[1] = 2;
              return m.size() == 1 ? 0 : 1;
          }
          EOF
          cmake -B build -DCMAKE_PREFIX_PATH=/tmp/emhash-install
          cmake --build build
          ./build/test_app
          echo "find_package smoke test passed"
        shell: bash

  windows-msvc:
    name: Windows / MSVC / C++${{ matrix.std }}
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        std: [17, 20, 23]
    steps:
      - uses: actions/checkout@v6

      - name: Configure (CMake)
        run: cmake -B build -S tests
        shell: bash

      - name: Build
        run: cmake --build build --target test_verify test_debug test_attack --config Release
        shell: bash

      - name: Run tests
        run: |
          ./build/Release/test_verify.exe
          ./build/Release/test_debug.exe
          ./build/Release/test_attack.exe
        shell: bash

  # Temporarily disabled: clang-format check
  # Re-enable after formatting issues are resolved.
  clang-format-check:
    name: clang-format check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: false
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          # Only check files changed in this PR/commit to reduce noise.
          # Falls back to checking all headers if no base commit is available.
          set -e
          FILES=$(find include -name '*.hpp' -o -name '*.h' | sort)
          if [ -z "$FILES" ]; then
            echo "No header files to check"
            exit 0
          fi
          echo "Checking formatting on:"
          echo "$FILES"
          # --dry-run -Werror: report files needing formatting, fail if any.
          # We use -i with --dry-run to get a diff without writing.
          DIFF_OUTPUT=$(clang-format --dry-run --Werror --style=file --ferror-limit=0 $FILES 2>&1) || true
          if echo "$DIFF_OUTPUT" | grep -q "code format"; then
            echo "::error::Some files need clang-format. Run 'clang-format -i include/**/*.hpp' locally."
            echo "$DIFF_OUTPUT"
            exit 1
          fi
          echo "All files are properly formatted"
        shell: bash
