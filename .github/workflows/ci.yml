name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'images/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Core build + test (4 matrix: ubuntu/macos × g++/clang++)
  # Compiles all test binaries in one step, runs them in one step.
  # Strict warnings use -fsyntax-only (no codegen) for speed.
  # ==========================================================================
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++
          - os: ubuntu-latest
            compiler: clang++
          - os: macos-latest
            compiler: g++
          - os: macos-latest
            compiler: clang++

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          package="${{ matrix.compiler }}"
          if [[ "$package" == "clang++" ]]; then package="clang"; fi
          sudo apt-get update && sudo apt-get install -y "$package"

      - name: Install coreutils + GCC on macOS
        if: runner.os == 'macOS'
        run: |
          brew install coreutils
          BREW_PREFIX=$(brew --prefix)
          echo "$BREW_PREFIX/opt/coreutils/libexec/gnubin" >> $GITHUB_PATH
          if [[ "${{ matrix.compiler }}" == "g++" ]]; then
            brew install gcc
            GPP_BIN=$(ls "$BREW_PREFIX/bin/g++-"* 2>/dev/null | head -1)
            [[ -n "$GPP_BIN" ]] && ln -sf "$GPP_BIN" "$BREW_PREFIX/bin/g++"
            echo "$BREW_PREFIX/bin" >> $GITHUB_PATH
            g++ --version | head -1
          fi

      - name: Set compiler flags
        run: |
          if [[ "${{ runner.os }}" == "macOS" && "${{ matrix.compiler }}" == "g++" ]]; then
            echo "CXXFLAGS_EXTRA=-fpermissive" >> $GITHUB_ENV
          else
            echo "CXXFLAGS_EXTRA=" >> $GITHUB_ENV
          fi

      - name: Show CPU info
        run: |
          echo "=== CPU Info ==="
          lscpu 2>/dev/null | grep -E "Model name|Socket|Core|Thread|CPU\(s\)|MHz" || true
          sysctl -n machdep.cpu.brand_string 2>/dev/null || true
          sysctl -n hw.ncpu 2>/dev/null || true
          nproc 2>/dev/null || echo "nproc N/A"
          echo "=== Memory ==="
          free -h 2>/dev/null || vm_stat 2>/dev/null | head -5 || true
        shell: bash

      - name: Build all tests
        run: |
          cd tests
          CXX="${{ matrix.compiler }}"
          FLAGS="-std=c++17 -O2 $CXXFLAGS_EXTRA -I../include"
          $CXX $FLAGS verify/test_all_maps.cpp -o test_verify
          $CXX $FLAGS verify/test_extreme.cpp -o test_extreme
          $CXX $FLAGS verify/test_hashset_allocator.cpp -o test_hashset_allocator
          $CXX $FLAGS verify/test_string_key_leak.cpp -o test_string_key_leak
          $CXX -std=c++17 -g -O0 $CXXFLAGS_EXTRA -I../include debug/debug_all_maps.cpp -o test_debug
          $CXX $FLAGS -DEMH_SAFE_PSL attack/hash_attack_all.cpp -o test_attack
          $CXX $FLAGS stress/stress_all_maps.cpp -o test_stress
        shell: bash

      - name: Run all tests
        run: |
          cd tests
          TIMEOUT=$(command -v gtimeout 2>/dev/null || command -v timeout)
          $TIMEOUT 300 ./test_verify
          $TIMEOUT 120 ./test_extreme
          $TIMEOUT 60  ./test_hashset_allocator
          $TIMEOUT 120 ./test_string_key_leak
          $TIMEOUT 300 ./test_attack
          $TIMEOUT 300 ./test_stress
          $TIMEOUT 300 ./test_debug
        shell: bash

      - name: Strict warnings (-fsyntax-only)
        if: runner.os != 'macOS' || matrix.compiler != 'g++'
        run: |
          cd tests
          CXX="${{ matrix.compiler }}"
          WARN_FLAGS="-Wall -Wextra -Wpedantic -Wshadow -Wnon-virtual-dtor -Wno-unused-parameter -Werror -I../include"
          for std in 17 20 23; do
            echo "::group::strict warnings C++$std"
            $CXX -std=c++$std -O2 -fsyntax-only $WARN_FLAGS verify/test_all_maps.cpp
            echo "::endgroup::"
          done
        shell: bash

  # ==========================================================================
  # Compat: C++20/23 only (C++17 covered by build job)
  # ==========================================================================
  compat:
    name: Compat / ${{ matrix.compiler }} / C++${{ matrix.std }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
        std: [20, 23]

    steps:
      - uses: actions/checkout@v6

      - name: Install compiler
        run: |
          sudo apt-get update
          package="${{ matrix.compiler }}"
          if [[ "$package" == "clang++" ]]; then package="clang"; fi
          sudo apt-get install -y "$package"

      - name: Compile and run
        run: |
          cd tests
          ${{ matrix.compiler }} -std=c++${{ matrix.std }} -O2 -I../include verify/test_all_maps.cpp -o test_verify_compat
          ./test_verify_compat
        shell: bash

  # ==========================================================================
  # ASan + UBSan (combined; subsumes standalone ubsan job)
  # ==========================================================================
  asan:
    name: ASan+UBSan / ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [g++, clang++]
        exclude:
          # Homebrew GCC does not ship libasan
          - os: macos-latest
            compiler: g++

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          package="${{ matrix.compiler }}"
          if [[ "$package" == "clang++" ]]; then package="clang"; fi
          sudo apt-get update && sudo apt-get install -y "$package"

      - name: Build with ASan+UBSan
        run: |
          cd tests
          CXX="${{ matrix.compiler }}"
          SAN="-std=c++17 -O1 -fsanitize=address,undefined -fno-omit-frame-pointer -I../include"
          $CXX $SAN verify/test_all_maps.cpp -o test_verify_asan
          $CXX $SAN verify/test_extreme.cpp -o test_extreme_asan
          $CXX $SAN verify/test_string_key_leak.cpp -o test_string_key_leak_asan
          $CXX $SAN stress/stress_fix.cpp -o test_stress_asan
          $CXX $SAN -DEMH_SAFE_PSL attack/hash_attack_all.cpp -o test_attack_asan
        shell: bash

      - name: Run with ASan+UBSan
        run: |
          cd tests
          ./test_verify_asan
          ./test_extreme_asan
          ./test_string_key_leak_asan
          ./test_stress_asan
          ./test_attack_asan
        shell: bash

  # ==========================================================================
  # CMake build verification (no test runs; build job covers execution)
  # ==========================================================================
  cmake:
    name: CMake / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -B build -S tests
        shell: bash

      - name: Build
        run: cmake --build build --config Release --target test_verify test_debug test_attack test_stress quick_test8 test_emilib_comprehensive test_hashset_allocator test_string_key_leak
        shell: bash

  cmake-install:
    name: CMake install / find_package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Configure & Install
        run: |
          cmake -B build -DCMAKE_INSTALL_PREFIX=/tmp/emhash-install
          cmake --build build
          cmake --install build
        shell: bash

      - name: Verify installed files
        run: |
          echo "=== Installed headers ==="
          find /tmp/emhash-install -name '*.hpp' -o -name '*.h' | sort
          echo "=== CMake config files ==="
          find /tmp/emhash-install -name '*.cmake' | sort
          test -f /tmp/emhash-install/include/emhash/hash_table7.hpp
          test -f /tmp/emhash-install/include/emilib/emihmap1.hpp
          test -f /tmp/emhash-install/lib/cmake/emhash/emhashConfig.cmake
          test -f /tmp/emhash-install/lib/cmake/emhash/emhashConfigVersion.cmake
          echo "All install checks passed"
        shell: bash

      - name: Test find_package
        run: |
          mkdir -p /tmp/test_find_package && cd /tmp/test_find_package
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(test_find_package LANGUAGES CXX)
          find_package(emhash REQUIRED CONFIG PATHS /tmp/emhash-install/lib/cmake/emhash NO_DEFAULT_PATH)
          add_executable(test_app test.cpp)
          target_link_libraries(test_app PRIVATE emhash::emhash)
          EOF
          cat > test.cpp <<'EOF'
          #include <emhash/hash_table7.hpp>
          int main() {
              emhash7::HashMap<int,int> m;
              m[1] = 2;
              return m.size() == 1 ? 0 : 1;
          }
          EOF
          cmake -B build -DCMAKE_PREFIX_PATH=/tmp/emhash-install
          cmake --build build
          ./build/test_app
          echo "find_package smoke test passed"
        shell: bash

  # ==========================================================================
  # TSan (informational — emhash is single-threaded)
  # ==========================================================================
  tsan:
    name: TSan / g++
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build with TSan
        run: |
          cd tests
          g++ -std=c++17 -O1 -fsanitize=thread -fno-omit-frame-pointer -I../include verify/test_find_slot_bucket.cpp -lpthread -o test_tsan_find
          g++ -std=c++17 -O1 -fsanitize=thread -fno-omit-frame-pointer -I../include verify/test_emilib_comprehensive.cpp -lpthread -o test_tsan_emilib
        shell: bash

      - name: Run with TSan
        run: |
          cd tests
          echo "=== TSan: test_find_slot_bucket (concurrent erase) ==="
          ./test_tsan_find 2>&1 || echo "::warning::TSan detected data races (expected — emhash is not thread-safe)"
          echo "=== TSan: test_emilib_comprehensive (concurrent reads) ==="
          ./test_tsan_emilib 2>&1 || echo "::warning::TSan detected data races (expected — emhash is not thread-safe)"
        shell: bash

  # ==========================================================================
  # GCC multi-version regression (oldest + newest only)
  # ==========================================================================
  gcc-versions:
    name: GCC ${{ matrix.gcc_version }} / C++17
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        gcc_version: ['10', '13']

    steps:
      - uses: actions/checkout@v6

      - name: Install GCC ${{ matrix.gcc_version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-${{ matrix.gcc_version }}

      - name: Build and run
        run: |
          cd tests
          GXX=g++-${{ matrix.gcc_version }}
          $GXX -std=c++17 -O2 -Wall -Wextra -Wno-unused-parameter -I../include verify/test_all_maps.cpp -o test_verify_gcc
          $GXX -std=c++17 -O2 -Wall -Wextra -Wno-unused-parameter -I../include verify/test_extreme.cpp -o test_extreme_gcc
          $GXX -std=c++17 -O2 -Wall -Wextra -Wno-unused-parameter -I../include verify/test_string_key_leak.cpp -o test_string_key_leak_gcc
          $GXX -std=c++17 -O2 -Wall -Wextra -Wno-unused-parameter -I../include stress/stress_all_maps.cpp -o test_stress_gcc
          ./test_verify_gcc
          ./test_extreme_gcc
          ./test_string_key_leak_gcc
          ./test_stress_gcc
        shell: bash

  # ==========================================================================
  # Windows MSVC (C++17 Release + C++23 Release/Debug)
  # Debug skips attack/stress (/Od too slow for N=10000 high-load)
  # ==========================================================================
  windows-msvc:
    name: Windows / MSVC / C++${{ matrix.std }} / ${{ matrix.config }}
    runs-on: windows-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - std: 17
            config: Release
          - std: 23
            config: Release
          - std: 23
            config: Debug

    steps:
      - uses: actions/checkout@v6

      - name: Configure (CMake)
        run: cmake -B build -S tests
        shell: bash

      - name: Build
        run: cmake --build build --target test_verify test_debug test_extreme test_hashset_allocator test_string_key_leak test_attack test_stress --config ${{ matrix.config }}
        shell: bash

      - name: Run tests
        timeout-minutes: 15
        run: |
          # test_verify + test_extreme + test_hashset_allocator are fast
          ./build/${{ matrix.config }}/test_verify.exe
          ./build/${{ matrix.config }}/test_extreme.exe
          ./build/${{ matrix.config }}/test_hashset_allocator.exe
          ./build/${{ matrix.config }}/test_string_key_leak.exe
          # test_attack and test_stress do high-load cases;
          # in Debug config (/Od) this takes too long, so we skip them.
          if [[ "${{ matrix.config }}" == "Release" ]]; then
            ./build/${{ matrix.config }}/test_attack.exe
            ./build/${{ matrix.config }}/test_stress.exe
          else
            echo "::notice::Skipping test_attack and test_stress in Debug config (/Od is too slow for high-load cases)"
          fi
        shell: bash

  # ==========================================================================
  # 32-bit build (catches size_t / uint64_t truncation bugs)
  # ==========================================================================
  i386:
    name: 32-bit / GCC / C++17
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install 32-bit toolchain
        run: |
          sudo apt-get update
          sudo dpkg --add-architecture i386
          sudo apt-get install -y g++-multilib lib32stdc++-*-dev

      - name: Build 32-bit
        run: |
          cd tests
          g++ -m32 -std=c++17 -O2 -Wall -Wextra -Wno-unused-parameter \
            -I../include verify/test_all_maps.cpp -o test_verify_32
          g++ -m32 -std=c++17 -O2 -Wall -Wextra -Wno-unused-parameter \
            -I../include verify/test_extreme.cpp -o test_extreme_32
          g++ -m32 -std=c++17 -O2 -Wall -Wextra -Wno-unused-parameter \
            -I../include verify/test_string_key_leak.cpp -o test_string_key_leak_32
        shell: bash

      - name: Run 32-bit tests
        run: |
          cd tests
          ./test_verify_32
          ./test_extreme_32
          ./test_string_key_leak_32
        shell: bash

  # ==========================================================================
  # ARM64 cross-compile (catches endianness / alignment / portability bugs)
  # ==========================================================================
  arm64-cross:
    name: ARM64 cross-compile / Clang
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install clang + ARM64 target
        run: |
          sudo apt-get update
          sudo apt-get install -y clang qemu-user g++-aarch64-linux-gnu

      - name: Cross-compile for aarch64
        run: |
          cd tests
          clang++ --target=aarch64-linux-gnu -std=c++17 -O2 \
            -Wall -Wextra -Wno-unused-parameter \
            -I../include verify/test_all_maps.cpp -o test_verify_arm64
          clang++ --target=aarch64-linux-gnu -std=c++17 -O2 \
            -Wall -Wextra -Wno-unused-parameter \
            -I../include verify/test_extreme.cpp -o test_extreme_arm64
        shell: bash

      - name: Run under QEMU
        run: |
          cd tests
          qemu-aarch64 -L /usr/aarch64-linux-gnu ./test_verify_arm64 2>/dev/null || \
            echo "::notice::ARM64 runtime test skipped (no sysroot); cross-compile only"
          qemu-aarch64 -L /usr/aarch64-linux-gnu ./test_extreme_arm64 2>/dev/null || \
            echo "::notice::ARM64 runtime test skipped (no sysroot); cross-compile only"
        shell: bash

  # ==========================================================================
  # MemorySanitizer (catches uninitialized memory reads)
  # ==========================================================================
  msan:
    name: MSan / Clang
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Build with MSan
        run: |
          cd tests
          clang++ -std=c++17 -O1 -fsanitize=memory -fno-omit-frame-pointer \
            -I../include verify/test_all_maps.cpp -o test_verify_msan
          clang++ -std=c++17 -O1 -fsanitize=memory -fno-omit-frame-pointer \
            -I../include verify/test_string_key_leak.cpp -o test_string_key_leak_msan
        shell: bash

      - name: Run with MSan
        run: |
          cd tests
          ./test_verify_msan
          ./test_string_key_leak_msan
        shell: bash

  # ==========================================================================
  # Code coverage (gcov + lcov, GCC only)
  # ==========================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ lcov

      - name: Build with coverage
        run: |
          cd tests
          COV="-std=c++17 -O0 -g --coverage -fprofile-arcs -ftest-coverage -I../include"
          g++ $COV verify/test_all_maps.cpp -o test_verify_cov
          g++ $COV verify/test_extreme.cpp -o test_extreme_cov
          g++ $COV verify/test_string_key_leak.cpp -o test_string_key_leak_cov
          g++ $COV verify/test_hashset_full_api.cpp -o test_hashset_cov
          g++ $COV verify/test_emilib_comprehensive.cpp -o test_emilib_cov
          g++ $COV stress/stress_fix.cpp -o test_stress_cov
          g++ $COV stress/stress_all_maps.cpp -o test_stress_all_cov
          g++ $COV -DEMH_SAFE_PSL attack/hash_attack_all.cpp -o test_attack_cov
        shell: bash

      - name: Run tests
        run: |
          cd tests
          ./test_verify_cov
          ./test_extreme_cov
          ./test_string_key_leak_cov
          ./test_hashset_cov
          ./test_emilib_cov
          ./test_stress_cov
          ./test_stress_all_cov
          ./test_attack_cov
        shell: bash

      - name: Generate coverage report
        run: |
          lcov --capture --directory tests --output-file coverage.info \
               --include '${{ github.workspace }}/include/emhash/hash_*' \
               --include '${{ github.workspace }}/include/emilib/*' \
               --exclude '${{ github.workspace }}/include/emilib/sse2neon.h' \
               --ignore-errors unused
          genhtml coverage.info --output-directory coverage_html --title "emhash coverage" --num-spaces 4
          lcov --summary coverage.info
          COV_PERCENT=$(lcov --summary coverage.info 2>&1 | grep 'lines' | grep -oP '\d+\.\d+%' | head -1)
          FUNC_PERCENT=$(lcov --summary coverage.info 2>&1 | grep 'functions' | grep -oP '\d+\.\d+%' | head -1)
          {
            echo "### 📊 Code Coverage Report"
            echo ""
            echo "| Metric | Rate |"
            echo "|--------|------|"
            echo "| **Lines**     | **${COV_PERCENT}** |"
            echo "| **Functions** | **${FUNC_PERCENT}** |"
            echo ""
            echo "#### Per-File Coverage"
            echo ""
            echo '```'
            lcov --list coverage.info 2>&1 | grep -E 'emhash|emilib|=====|Total'
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
        shell: bash

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage_html/
          retention-days: 30

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-info
          path: coverage.info
          retention-days: 30

  # ==========================================================================
  # GCC strict warnings (C++23 only; C++17/20 covered by build job)
  # ==========================================================================
  gcc-strict:
    name: GCC Strict / C++23
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build with strict GCC warnings
        run: |
          cd tests
          g++ -std=c++23 -O2 -Wall -Wextra -Wpedantic \
            -Wconversion -Wshadow -Wnon-virtual-dtor \
            -Wdouble-promotion -Wformat=2 -Wmissing-include-dirs \
            -Wnull-dereference -Wno-unused-parameter \
            -I../include verify/test_all_maps.cpp -o test_gcc_strict 2>&1 | tee gcc_warnings.txt
          if grep -q "include/emhash/" gcc_warnings.txt; then
            echo "::error::Warnings found in emhash headers"
            grep "include/emhash/" gcc_warnings.txt
            exit 1
          fi
          echo "No warnings in emhash headers"
        shell: bash

      - name: Run test
        run: cd tests && ./test_gcc_strict
        shell: bash

  # ==========================================================================
  # Performance benchmark (g++ only)
  # ==========================================================================
  benchmark:
    name: Benchmark / g++
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ cmake git

      - name: Configure with benchmarks
        run: cmake -B build -S tests -DEMHASH_ENABLE_BENCH=ON -DCMAKE_BUILD_TYPE=Release
        shell: bash

      - name: Build benchmark
        run: cmake --build build --target emhash_bench --config Release
        shell: bash

      - name: Run benchmark
        run: |
          cd build
          ./emhash_bench --benchmark_format=console --benchmark_out=benchmark_results.json
        shell: bash

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-g++
          path: build/benchmark_results.json
          retention-days: 30
