name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'images/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Core build + test (4 matrix: ubuntu/macos × g++/clang++)
  # Compiles all test binaries in one step, runs them in one step.
  # Strict warnings use -fsyntax-only (no codegen) for speed.
  # ==========================================================================
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++
          - os: ubuntu-latest
            compiler: clang++
          - os: macos-latest
            compiler: g++
          - os: macos-latest
            compiler: clang++

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          package="${{ matrix.compiler }}"
          if [[ "$package" == "clang++" ]]; then package="clang"; fi
          sudo apt-get update && sudo apt-get install -y "$package"

      - name: Install coreutils + GCC on macOS
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: '1'
        run: |
          brew install coreutils
          BREW_PREFIX=$(brew --prefix)
          echo "$BREW_PREFIX/opt/coreutils/libexec/gnubin" >> $GITHUB_PATH
          if [[ "${{ matrix.compiler }}" == "g++" ]]; then
            brew install gcc
            GPP_BIN=$(ls "$BREW_PREFIX/bin/g++-"* 2>/dev/null | head -1)
            [[ -n "$GPP_BIN" ]] && ln -sf "$GPP_BIN" "$BREW_PREFIX/bin/g++"
            echo "$BREW_PREFIX/bin" >> $GITHUB_PATH
            g++ --version | head -1
          fi

      - name: Set compiler flags
        run: |
          if [[ "${{ runner.os }}" == "macOS" && "${{ matrix.compiler }}" == "g++" ]]; then
            echo "CXXFLAGS_EXTRA=-fpermissive" >> $GITHUB_ENV
          else
            echo "CXXFLAGS_EXTRA=" >> $GITHUB_ENV
          fi

      - name: Show CPU info
        run: |
          echo "=== CPU Info ==="
          lscpu 2>/dev/null | grep -E "Model name|Socket|Core|Thread|CPU\(s\)|MHz" || true
          sysctl -n machdep.cpu.brand_string 2>/dev/null || true
          sysctl -n hw.ncpu 2>/dev/null || true
          nproc 2>/dev/null || echo "nproc N/A"
          echo "=== Memory ==="
          free -h 2>/dev/null || vm_stat 2>/dev/null | head -5 || true
        shell: bash

      - name: Build all tests
        run: |
          cd tests
          CXX="${{ matrix.compiler }}"
          FLAGS="-std=c++17 -O2 $CXXFLAGS_EXTRA -I../include -I. -Icommon"
          # Unit tests (doctest-based, standalone executables)
          for f in unit/test_crud unit/test_full_api unit/test_copy_move unit/test_iterators \
                   unit/test_edge_cases unit/test_string_keys unit/test_special_keys \
                   unit/test_reserve_clear unit/test_allocator unit/test_hashset; do
            $CXX $FLAGS $f.cpp -o $(basename $f)
          done
          # Memory tests
          for f in memory/test_string_key_leak memory/test_lifecycle_audit memory/test_sanitizer; do
            $CXX $FLAGS $f.cpp -o $(basename $f)
          done
          # Stress tests
          $CXX $FLAGS stress/test_stress_all.cpp -o test_stress
          $CXX $FLAGS stress/test_reserve_fix.cpp -o test_reserve_fix
          # Attack tests (need EMH_SAFE_PSL)
          $CXX $FLAGS -DEMH_SAFE_PSL attack/test_hash_attack.cpp -o test_attack
          $CXX $FLAGS -DEMH_SAFE_PSL attack/test_collision_hardening.cpp -o test_collision
          # Debug
          $CXX -std=c++17 -g -O0 $CXXFLAGS_EXTRA -I../include -I. -Icommon debug/debug_all_maps.cpp -o test_debug
        shell: bash

      - name: Run all tests
        run: |
          cd tests
          TIMEOUT=$(command -v gtimeout 2>/dev/null || command -v timeout)
          # Unit tests (fast)
          $TIMEOUT 120 ./test_crud
          $TIMEOUT 120 ./test_full_api
          $TIMEOUT 120 ./test_copy_move
          $TIMEOUT 120 ./test_iterators
          $TIMEOUT 120 ./test_edge_cases
          $TIMEOUT 120 ./test_string_keys
          $TIMEOUT 120 ./test_special_keys
          $TIMEOUT 120 ./test_reserve_clear
          $TIMEOUT 120 ./test_allocator
          $TIMEOUT 120 ./test_hashset
          # Memory tests
          $TIMEOUT 120 ./test_string_key_leak
          $TIMEOUT 300 ./test_lifecycle_audit
          $TIMEOUT 120 ./test_sanitizer
          # Stress + attack (slower)
          $TIMEOUT 600 ./test_stress
          $TIMEOUT 120 ./test_reserve_fix
          $TIMEOUT 600 ./test_attack
          $TIMEOUT 300 ./test_collision
          # Debug
          $TIMEOUT 300 ./test_debug
        shell: bash

      - name: Strict warnings (-fsyntax-only)
        if: runner.os != 'macOS' || matrix.compiler != 'g++'
        run: |
          cd tests
          CXX="${{ matrix.compiler }}"
          WARN_FLAGS="-Wall -Wextra -Wpedantic -Wshadow -Wnon-virtual-dtor -Wno-unused-parameter -Werror -I../include -I. -Icommon"
          for std in 17 23; do
            echo "::group::strict warnings C++$std"
            $CXX -std=c++$std -O2 -fsyntax-only $WARN_FLAGS unit/test_crud.cpp
            echo "::endgroup::"
          done
        shell: bash

  # ==========================================================================
  # Compat: C++23 only (C++17 covered by build job)
  # ==========================================================================
  compat:
    name: Compat / ${{ matrix.compiler }} / C++${{ matrix.std }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
        std: [23]

    steps:
      - uses: actions/checkout@v6

      - name: Install compiler
        run: |
          sudo apt-get update
          package="${{ matrix.compiler }}"
          if [[ "$package" == "clang++" ]]; then package="clang"; fi
          sudo apt-get install -y "$package"

      - name: Compile and run
        run: |
          cd tests
          ${{ matrix.compiler }} -std=c++${{ matrix.std }} -O2 -I../include -I. -Icommon unit/test_crud.cpp -o test_verify_compat
          ./test_verify_compat
        shell: bash

  # ==========================================================================
  # ASan + UBSan (combined; subsumes standalone ubsan job)
  # ==========================================================================
  asan:
    name: ASan+UBSan / ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [g++, clang++]
        exclude:
          # Homebrew GCC does not ship libasan
          - os: macos-latest
            compiler: g++

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          package="${{ matrix.compiler }}"
          if [[ "$package" == "clang++" ]]; then package="clang"; fi
          sudo apt-get update && sudo apt-get install -y "$package"

      - name: Build with ASan+UBSan
        run: |
          cd tests
          CXX="${{ matrix.compiler }}"
          SAN="-std=c++17 -O1 -fsanitize=address,undefined -fno-omit-frame-pointer -I../include -I. -Icommon"
          $CXX $SAN unit/test_crud.cpp -o test_crud_asan
          $CXX $SAN unit/test_full_api.cpp -o test_full_api_asan
          $CXX $SAN unit/test_edge_cases.cpp -o test_edge_cases_asan
          $CXX $SAN memory/test_string_key_leak.cpp -o test_string_key_leak_asan
          $CXX $SAN memory/test_sanitizer.cpp -o test_sanitizer_asan
          $CXX $SAN memory/test_lifecycle_audit.cpp -o test_lifecycle_audit_asan
          $CXX $SAN stress/test_reserve_fix.cpp -o test_stress_asan
          $CXX $SAN -DASAN_LIGHT=1 -DEMH_SAFE_PSL attack/test_hash_attack.cpp -o test_attack_asan
        shell: bash

      - name: Run with ASan+UBSan
        run: |
          cd tests
          ./test_crud_asan
          ./test_full_api_asan
          ./test_edge_cases_asan
          ./test_string_key_leak_asan
          ./test_sanitizer_asan
          ./test_lifecycle_audit_asan
          ./test_stress_asan
          ./test_attack_asan
        shell: bash

  # ==========================================================================
  # CMake build verification (no test runs; build job covers execution)
  # ==========================================================================
  cmake:
    name: CMake / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -B build -S tests
        shell: bash

      - name: Build
        run: cmake --build build --config Release --target test_crud test_full_api test_copy_move test_iterators test_edge_cases test_string_keys test_special_keys test_reserve_clear test_allocator test_hashset test_string_key_leak test_lifecycle_audit test_sanitizer test_stress_all test_highload test_bad_hash test_reserve_fix test_hash_attack test_collision_hardening
        shell: bash

  cmake-install:
    name: CMake install / find_package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Configure & Install
        run: |
          cmake -B build -DCMAKE_INSTALL_PREFIX=/tmp/emhash-install
          cmake --build build
          cmake --install build
        shell: bash

      - name: Verify installed files
        run: |
          echo "=== Installed headers ==="
          find /tmp/emhash-install -name '*.hpp' -o -name '*.h' | sort
          echo "=== CMake config files ==="
          find /tmp/emhash-install -name '*.cmake' | sort
          test -f /tmp/emhash-install/include/emhash/hash_table7.hpp
          test -f /tmp/emhash-install/include/emilib/emihmap1.hpp
          test -f /tmp/emhash-install/lib/cmake/emhash/emhashConfig.cmake
          test -f /tmp/emhash-install/lib/cmake/emhash/emhashConfigVersion.cmake
          echo "All install checks passed"
        shell: bash

      - name: Test find_package
        run: |
          mkdir -p /tmp/test_find_package && cd /tmp/test_find_package
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(test_find_package LANGUAGES CXX)
          find_package(emhash REQUIRED CONFIG PATHS /tmp/emhash-install/lib/cmake/emhash NO_DEFAULT_PATH)
          add_executable(test_app test.cpp)
          target_link_libraries(test_app PRIVATE emhash::emhash)
          EOF
          cat > test.cpp <<'EOF'
          #include <emhash/hash_table7.hpp>
          int main() {
              emhash7::HashMap<int,int> m;
              m[1] = 2;
              return m.size() == 1 ? 0 : 1;
          }
          EOF
          cmake -B build -DCMAKE_PREFIX_PATH=/tmp/emhash-install
          cmake --build build
          ./build/test_app
          echo "find_package smoke test passed"
        shell: bash

  # ==========================================================================
  # TSan (informational — emhash is single-threaded)
  # ==========================================================================
  tsan:
    name: TSan / g++
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build with TSan
        run: |
          cd tests
          g++ -std=c++17 -O1 -fsanitize=thread -fno-omit-frame-pointer -I../include -I. -Icommon \
            unit/test_crud.cpp -lpthread -o test_tsan_crud
          g++ -std=c++17 -O1 -fsanitize=thread -fno-omit-frame-pointer -I../include -I. -Icommon \
            memory/test_sanitizer.cpp -lpthread -o test_tsan_sanitizer
        shell: bash

      - name: Run with TSan
        run: |
          cd tests
          echo "=== TSan: test_crud ==="
          ./test_tsan_crud 2>&1 || echo "::warning::TSan detected data races (expected — emhash is not thread-safe)"
          echo "=== TSan: test_sanitizer ==="
          ./test_tsan_sanitizer 2>&1 || echo "::warning::TSan detected data races (expected — emhash is not thread-safe)"
        shell: bash

  # ==========================================================================
  # GCC multi-version regression (oldest + newest only)
  # ==========================================================================
  gcc-versions:
    name: GCC ${{ matrix.gcc_version }} / C++17
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        gcc_version: ['10', '13']

    steps:
      - uses: actions/checkout@v6

      - name: Install GCC ${{ matrix.gcc_version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-${{ matrix.gcc_version }}

      - name: Build and run
        run: |
          cd tests
          GXX=g++-${{ matrix.gcc_version }}
          FLAGS="-std=c++17 -O2 -Wall -Wextra -Wno-unused-parameter -I../include -I. -Icommon"
          $GXX $FLAGS unit/test_crud.cpp -o test_crud_gcc
          $GXX $FLAGS unit/test_full_api.cpp -o test_full_api_gcc
          $GXX $FLAGS unit/test_edge_cases.cpp -o test_edge_cases_gcc
          $GXX $FLAGS memory/test_string_key_leak.cpp -o test_string_key_leak_gcc
          $GXX $FLAGS memory/test_lifecycle_audit.cpp -o test_lifecycle_audit_gcc
          $GXX $FLAGS stress/test_stress_all.cpp -o test_stress_gcc
          ./test_crud_gcc
          ./test_full_api_gcc
          ./test_edge_cases_gcc
          ./test_string_key_leak_gcc
          ./test_lifecycle_audit_gcc
          ./test_stress_gcc
        shell: bash

  # ==========================================================================
  # Windows MSVC (C++17 Release + C++23 Release/Debug)
  # Debug skips attack/stress (/Od too slow for N=10000 high-load)
  # ==========================================================================
  windows-msvc:
    name: Windows / MSVC / C++${{ matrix.std }} / ${{ matrix.config }}
    runs-on: windows-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - std: 17
            config: Release
          - std: 23
            config: Release
          - std: 23
            config: Debug

    steps:
      - uses: actions/checkout@v6

      - name: Configure (CMake)
        run: cmake -B build -S tests
        shell: bash

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --target test_crud test_full_api test_copy_move test_iterators test_edge_cases test_string_keys test_special_keys test_reserve_clear test_allocator test_hashset test_string_key_leak test_lifecycle_audit test_sanitizer test_stress_all test_highload test_bad_hash test_reserve_fix test_hash_attack test_collision_hardening
        shell: bash

      - name: Run tests
        timeout-minutes: 15
        run: |
          CONFIG="${{ matrix.config }}"
          DIR="build/$CONFIG"
          # Fast tests (always run)
          for t in test_crud test_full_api test_copy_move test_iterators test_edge_cases \
                   test_string_keys test_special_keys test_reserve_clear test_allocator \
                   test_hashset test_string_key_leak test_lifecycle_audit test_sanitizer; do
            echo "=== Running $t ==="
            "$DIR/$t.exe" || { echo "::error::$t failed"; exit 1; }
          done
          # Slow tests (skip in Debug — /Od too slow for high-load)
          if [[ "$CONFIG" == "Release" ]]; then
            for t in test_stress_all test_highload test_bad_hash test_reserve_fix \
                     test_hash_attack test_collision_hardening; do
              echo "=== Running $t ==="
              "$DIR/$t.exe" || { echo "::error::$t failed"; exit 1; }
            done
          else
            echo "::notice::Skipping stress/attack tests in Debug config"
          fi
        shell: bash

  # ==========================================================================
  # 32-bit build (catches size_t / uint64_t truncation bugs)
  # ==========================================================================
  i386:
    name: 32-bit / GCC / C++17
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install 32-bit toolchain
        run: |
          sudo apt-get update
          sudo dpkg --add-architecture i386
          sudo apt-get install -y g++-multilib lib32stdc++-*-dev

      - name: Build 32-bit
        run: |
          cd tests
          # -fsanitize=undefined catches 32-bit-specific UB (shift, truncation, alignment)
          FLAGS="-m32 -std=c++17 -O1 -g -msse2 -Wall -Wextra -Wno-unused-parameter -I../include -I. -Icommon -fsanitize=undefined -fno-sanitize-recover=undefined"
          g++ $FLAGS unit/test_crud.cpp -o test_crud_32
          g++ $FLAGS unit/test_edge_cases.cpp -o test_edge_cases_32
          g++ $FLAGS memory/test_string_key_leak.cpp -o test_string_key_leak_32
          g++ $FLAGS memory/test_lifecycle_audit.cpp -o test_lifecycle_audit_32
        shell: bash

      - name: Run 32-bit tests
        run: |
          cd tests
          # Run each test separately and capture exit codes so the log identifies
          # which test crashes (SIGSEGV = 139). set +e so all tests run even if one fails.
          set +e
          overall=0
          for t in test_crud_32 test_edge_cases_32 test_string_key_leak_32 test_lifecycle_audit_32; do
            echo "=================================================================="
            echo "Running ./$t ..."
            echo "=================================================================="
            ./$t
            rc=$?
            echo "::warning:: ./$t exited with code $rc"
            if [ $rc -ne 0 ]; then overall=1; fi
          done
          exit $overall
        shell: bash

  # ==========================================================================
  # ARM64 cross-compile (catches endianness / alignment / portability bugs)
  # ==========================================================================
  arm64-cross:
    name: ARM64 cross-compile / Clang
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install clang + ARM64 target
        run: |
          sudo apt-get update
          sudo apt-get install -y clang qemu-user g++-aarch64-linux-gnu

      - name: Cross-compile for aarch64
        run: |
          cd tests
          FLAGS="--target=aarch64-linux-gnu -std=c++17 -O2 -Wall -Wextra -Wno-unused-parameter -I../include -I. -Icommon"
          clang++ $FLAGS unit/test_crud.cpp -o test_crud_arm64
          clang++ $FLAGS unit/test_edge_cases.cpp -o test_edge_cases_arm64
        shell: bash

      - name: Run under QEMU
        run: |
          cd tests
          qemu-aarch64 -L /usr/aarch64-linux-gnu ./test_crud_arm64 2>/dev/null || \
            echo "::notice::ARM64 runtime test skipped (no sysroot); cross-compile only"
          qemu-aarch64 -L /usr/aarch64-linux-gnu ./test_edge_cases_arm64 2>/dev/null || \
            echo "::notice::ARM64 runtime test skipped (no sysroot); cross-compile only"
        shell: bash

  # ==========================================================================
  # MemorySanitizer (catches uninitialized memory reads)
  # ==========================================================================
  msan:
    name: MSan / Clang
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install clang and libc++
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libc++-dev libc++abi-dev

      - name: Build with MSan
        run: |
          cd tests
          # -include msan_unpoison.hpp: force-include the stream unpoisoner
          # so std::cout/cerr are marked initialized before doctest writes to them.
          # Without this, MSan reports false-positive use-of-uninitialized-value
          # because the uninstrumented libc++ runtime sets up the iostream globals.
          MSAN_FLAGS="-std=c++17 -O1 -fsanitize=memory -fno-omit-frame-pointer -stdlib=libc++ -I../include -I. -Icommon -include msan_unpoison.hpp -fsanitize-ignorelist=common/msan-ignorelist.txt"
          clang++ $MSAN_FLAGS unit/test_crud.cpp -o test_crud_msan
          clang++ $MSAN_FLAGS memory/test_string_key_leak.cpp -o test_string_key_leak_msan
          clang++ $MSAN_FLAGS memory/test_sanitizer.cpp -o test_sanitizer_msan
          clang++ $MSAN_FLAGS memory/test_lifecycle_audit.cpp -o test_lifecycle_audit_msan
        shell: bash

      - name: Run with MSan
        run: |
          cd tests
          export MSAN_OPTIONS="suppressions=${{ github.workspace }}/.github/msan-suppressions.txt"
          set +e
          overall=0
          for t in test_crud_msan test_string_key_leak_msan test_sanitizer_msan test_lifecycle_audit_msan; do
            echo "=== Running ./$t ==="
            ./$t
            rc=$?
            echo "::warning:: ./$t exited with code $rc"
            if [ $rc -ne 0 ]; then overall=1; fi
          done
          exit $overall
        shell: bash

  # ==========================================================================
  # Code coverage (gcov + lcov, GCC only) — 80% line coverage gate
  # ==========================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ lcov bc

      - name: Build with coverage
        run: |
          cd tests
          COV="-std=c++17 -O0 -g --coverage -fprofile-arcs -ftest-coverage -I../include -I. -Icommon"
          g++ $COV unit/test_crud.cpp -o test_crud_cov
          g++ $COV unit/test_full_api.cpp -o test_full_api_cov
          g++ $COV unit/test_copy_move.cpp -o test_copy_move_cov
          g++ $COV unit/test_iterators.cpp -o test_iterators_cov
          g++ $COV unit/test_edge_cases.cpp -o test_edge_cases_cov
          g++ $COV unit/test_string_keys.cpp -o test_string_keys_cov
          g++ $COV unit/test_special_keys.cpp -o test_special_keys_cov
          g++ $COV unit/test_reserve_clear.cpp -o test_reserve_clear_cov
          g++ $COV unit/test_allocator.cpp -o test_allocator_cov
          g++ $COV unit/test_hashset.cpp -o test_hashset_cov
          g++ $COV memory/test_string_key_leak.cpp -o test_string_key_leak_cov
          g++ $COV memory/test_lifecycle_audit.cpp -o test_lifecycle_audit_cov
          g++ $COV memory/test_sanitizer.cpp -o test_sanitizer_cov
          g++ $COV stress/test_stress_all.cpp -o test_stress_all_cov
          g++ $COV stress/test_reserve_fix.cpp -o test_stress_fix_cov
          g++ $COV -DEMH_SAFE_PSL attack/test_hash_attack.cpp -o test_attack_cov
        shell: bash

      - name: Run tests
        run: |
          cd tests
          ./test_crud_cov
          ./test_full_api_cov
          ./test_copy_move_cov
          ./test_iterators_cov
          ./test_edge_cases_cov
          ./test_string_keys_cov
          ./test_special_keys_cov
          ./test_reserve_clear_cov
          ./test_allocator_cov
          ./test_hashset_cov
          ./test_string_key_leak_cov
          ./test_lifecycle_audit_cov
          ./test_sanitizer_cov
          ./test_stress_all_cov
          ./test_stress_fix_cov
          ./test_attack_cov
        shell: bash

      - name: Generate coverage report
        run: |
          lcov --capture --directory tests --output-file coverage.info \
               --include '${{ github.workspace }}/include/emhash/hash_*' \
               --include '${{ github.workspace }}/include/emilib/*' \
               --exclude '${{ github.workspace }}/include/emilib/sse2neon.h' \
               --ignore-errors unused
          genhtml coverage.info --output-directory coverage_html --title "emhash coverage" --num-spaces 4
          lcov --summary coverage.info
          COV_PERCENT=$(lcov --summary coverage.info 2>&1 | grep 'lines' | grep -oP '\d+\.\d+' | head -1)
          FUNC_PERCENT=$(lcov --summary coverage.info 2>&1 | grep 'functions' | grep -oP '\d+\.\d+' | head -1)
          {
            echo "### 📊 Code Coverage Report"
            echo ""
            echo "| Metric | Rate |"
            echo "|--------|------|"
            echo "| **Lines**     | **${COV_PERCENT}%** |"
            echo "| **Functions** | **${FUNC_PERCENT}%** |"
            echo ""
            echo "#### Per-File Coverage"
            echo ""
            echo '```'
            lcov --list coverage.info 2>&1 | grep -E 'emhash|emilib|=====|Total'
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
          # 80% line coverage gate
          echo "Line coverage: ${COV_PERCENT}% (gate: 80%)"
          if (( $(echo "$COV_PERCENT < 80" | bc -l) )); then
            echo "::error::Line coverage ${COV_PERCENT}% is below 80% threshold"
            exit 1
          fi
          echo "Coverage gate passed"
        shell: bash

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage_html/
          retention-days: 30

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-info
          path: coverage.info
          retention-days: 30

  # ==========================================================================
  # GCC strict warnings (C++23 only; C++17 covered by build job)
  # ==========================================================================
  gcc-strict:
    name: GCC Strict / C++23
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build with strict GCC warnings
        run: |
          cd tests
          g++ -std=c++23 -O2 -Wall -Wextra -Wpedantic \
            -Wconversion -Wshadow -Wnon-virtual-dtor \
            -Wdouble-promotion -Wformat=2 -Wmissing-include-dirs \
            -Wnull-dereference -Wno-unused-parameter \
            -I../include -I. -Icommon unit/test_crud.cpp -o test_gcc_strict 2>&1 | tee gcc_warnings.txt
          if grep -q "include/emhash/" gcc_warnings.txt; then
            echo "::error::Warnings found in emhash headers"
            grep "include/emhash/" gcc_warnings.txt
            exit 1
          fi
          echo "No warnings in emhash headers"
        shell: bash

      - name: Run test
        run: cd tests && ./test_gcc_strict
        shell: bash

  # ==========================================================================
  # Performance benchmark (g++ only) — regression gate
  # ==========================================================================
  benchmark:
    name: Benchmark / g++
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ cmake git python3

      - name: Configure with benchmarks
        run: cmake -B build -S tests -DEMHASH_ENABLE_BENCH=ON -DCMAKE_BUILD_TYPE=Release
        shell: bash

      - name: Build benchmark
        run: cmake --build build --target emhash_bench --config Release
        shell: bash

      - name: Run benchmark
        run: |
          cd build
          ./emhash_bench --benchmark_format=console --benchmark_out=benchmark_results.json
        shell: bash

      - name: Download baseline from last successful main run
        id: download-baseline
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: benchmark-baseline
          path: baseline/
          workflow: ci.yml
          branch: main

      - name: Regression check
        if: github.event_name == 'pull_request' && steps.download-baseline.outcome == 'success'
        run: |
          if [[ -f baseline/benchmark_results.json ]]; then
            echo "=== Comparing against baseline ==="
            python3 - <<'PYEOF'
          import json, sys

          with open("baseline/benchmark_results.json") as f:
              baseline = {b["name"]: b for b in json.load(f)["benchmarks"]}
          with open("build/benchmark_results.json") as f:
              current = {b["name"]: b for b in json.load(f)["benchmarks"]}

          regressions = []
          THRESHOLD = 1.25  # 25% slower than baseline = regression

          for name, cur in current.items():
              if name not in baseline:
                  print(f"[NEW] {name}: {cur['real_time']:.0f} {cur['time_unit']}")
                  continue
              base_time = baseline[name]["real_time"]
              cur_time = cur["real_time"]
              ratio = cur_time / base_time if base_time > 0 else 1.0
              status = "OK" if ratio < THRESHOLD else "REGRESSION"
              print(f"[{status}] {name}: {cur_time:.0f} vs {base_time:.0f} {cur['time_unit']} (ratio={ratio:.2f})")
              if ratio >= THRESHOLD:
                  regressions.append((name, ratio))

          if regressions:
              print(f"\n::error::Benchmark regression detected ({len(regressions)} benchmarks >25% slower)")
              for name, ratio in regressions:
                  print(f"  - {name}: {ratio:.2f}x slower")
              sys.exit(1)
          else:
              print("\nNo regressions detected (threshold: 25%)")
          PYEOF
          else
            echo "No baseline found, skipping regression check"
          fi
        shell: bash

      - name: Upload benchmark results (as baseline for next run)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: build/benchmark_results.json
          retention-days: 90
