name: Warnings Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  warnings:
    name: Compile with strict warnings
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
        standard: [c++17, c++20]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install compiler
        run: |
          sudo apt-get update
          package="${{ matrix.compiler }}"
          if [[ "$package" == "clang++" ]]; then
            package="clang"
          fi
          sudo apt-get install -y "$package"

      - name: Compile (verify tests, ${{ matrix.compiler }}, ${{ matrix.standard }})
        run: |
          cd tests
          ${{ matrix.compiler }} -std=${{ matrix.standard }} \
            -O2 -g \
            -Wall -Wextra -Wpedantic -Wshadow -Wnon-virtual-dtor -Wold-style-cast \
            -I../include \
            verify/test_all_maps.cpp -o /tmp/test_warnings 2>&1 | tee /tmp/warnings.log
          # Fail if there are warnings (grep returns 0 if match found)
          if grep -q "warning:" /tmp/warnings.log; then
            echo "::warning::Compiler warnings detected, see log above"
            exit 1
          fi
