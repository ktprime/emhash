name: Format Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  clang-format:
    name: clang-format (LLVM style)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install clang-format-20
        run: |
          # clang-format-20 is not in Ubuntu 24.04 default repos; add LLVM apt repo
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
            sudo gpg --dearmor --yes -o /usr/share/keyrings/apt.llvm.org.gpg
          echo "deb [signed-by=/usr/share/keyrings/apt.llvm.org.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" | \
            sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-20

      - name: Check formatting
        run: |
          # Only check include directory (our own header-only library)
          # Exclude third-party sse2neon.h
          find include \
            -type f \( -name '*.hpp' -o -name '*.h' \) \
            -not -name 'sse2neon.h' \
            -print | xargs clang-format-20 --dry-run --Werror

      - name: Show diff (if any)
        if: failure()
        run: |
          find include \
            -type f \( -name '*.hpp' -o -name '*.h' \) \
            -not -name 'sse2neon.h' \
            -print | xargs clang-format-20 --dry-run
