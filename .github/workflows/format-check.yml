name: Format Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  clang-format:
    name: clang-format (LLVM style)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          # Only check our own source files (not third-party, not generated, not vendored)
          find . \
            -path ./thirdparty -prune -o \
            -path ./bench/tsl_bench -prune -o \
            -path ./bench/qc-core -prune -o \
            -path ./bench/boost_bench -prune -o \
            -path ./.git -prune -o \
            -name sse2neon.h -prune -o \
            -type f \( -name '*.hpp' -o -name '*.cpp' -o -name '*.h' -o -name '*.cc' \) \
            -print | xargs clang-format-18 --dry-run --Werror

      - name: Show diff (if any)
        if: failure()
        run: |
          find . \
            -path ./thirdparty -prune -o \
            -path ./bench/tsl_bench -prune -o \
            -path ./bench/qc-core -prune -o \
            -path ./bench/boost_bench -prune -o \
            -path ./.git -prune -o \
            -name sse2neon.h -prune -o \
            -type f \( -name '*.hpp' -o -name '*.cpp' -o -name '*.h' -o -name '*.cc' \) \
            -print | xargs clang-format-18 --dry-run

  clang-tidy:
    name: clang-tidy (static analysis)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18

      - name: Run clang-tidy on headers
        run: |
          # Create a dummy TU to analyze header-only library
          for hdr in include/emhash/hash_table*.hpp include/emilib/emihmap*.hpp; do
            echo "Checking $hdr..."
            clang-tidy-18 --header-filter="$hdr" \
              --checks='-*,bugprone-*,cert-*,performance-*,readability-*' \
              -std=c++17 -I include \
              /dev/null -include "$hdr" 2>&1 | tee -a tidy_output.txt
          done
          # Check for actual errors (warnings are informational)
          if grep -q "error:" tidy_output.txt; then
            echo "clang-tidy found errors"
            exit 1
          fi
