name: Format Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  clang-format:
    name: clang-format (LLVM style)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          # Only check include directory (our own header-only library)
          # Exclude third-party sse2neon.h
          find include \
            -type f \( -name '*.hpp' -o -name '*.h' \) \
            -not -name 'sse2neon.h' \
            -print | xargs clang-format-18 --dry-run --Werror

      - name: Show diff (if any)
        if: failure()
        run: |
          find include \
            -type f \( -name '*.hpp' -o -name '*.h' \) \
            -not -name 'sse2neon.h' \
            -print | xargs clang-format-18 --dry-run

  clang-tidy:
    name: clang-tidy (static analysis)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18

      - name: Run clang-tidy on headers
        run: |
          # Create a dummy TU to analyze header-only library
          # Disable style checks that conflict with project conventions:
          # - readability-identifier-naming: project uses _prefix for private members
          # - readability-identifier-length: wyhash uses short names (A, B, p) for clarity
          # - readability-magic-numbers: wyhash constants are intentional
          # - readability-uppercase-literal-suffix: ull vs ULL is stylistic
          # - readability-isolate-declaration: multiple declarations are intentional
          for hdr in include/emhash/hash_table*.hpp include/emilib/emihmap*.hpp; do
            echo "Checking $hdr..."
            clang-tidy-18 --header-filter="$hdr" \
              --checks='-*,bugprone-*,cert-*,performance-*,-bugprone-easily-swappable-parameters' \
              -- -std=c++17 -I include \
              /dev/null -include "$hdr" 2>&1 | tee -a tidy_output.txt
          done
          # Check for actual errors (warnings are informational)
          if grep -q "error:" tidy_output.txt; then
            echo "clang-tidy found errors"
            exit 1
          fi
